<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sticky Date Header — Mockup</title>
  <style>
    :root {
      --color-primary-500: #2563eb;
      --color-primary-600: #1d4ed8;
      --color-primary-100: #dbeafe;
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --border-default: #e5e7eb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-inverse: #ffffff;
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.10), 0 4px 6px -4px rgba(0,0,0,0.05);
      --radius-lg: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .app-header {
      flex-shrink: 0; height: 64px; background: var(--bg-primary);
      border-bottom: 1px solid var(--border-default);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .app-header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    .controls { display: flex; gap: 12px; align-items: center; }
    .toggle-pill {
      display: inline-flex; gap: 8px; align-items: center;
      padding: 6px 12px; border: 1px solid var(--border-default);
      border-radius: 999px; background: var(--bg-primary);
      cursor: pointer; font-size: 13px; font-weight: 500; user-select: none;
    }
    .toggle-pill input { accent-color: var(--color-primary-500); }
    .status-pill {
      display: inline-flex; gap: 6px; align-items: center;
      padding: 6px 10px; border-radius: 999px;
      background: var(--bg-secondary); font-size: 12px;
      color: var(--text-secondary);
    }
    .status-pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #9ca3af; transition: background 0.18s ease-out;
    }
    .status-pill.stuck .dot { background: #16a34a; }

    .hint {
      flex-shrink: 0; padding: 10px 24px; font-size: 13px;
      color: var(--text-secondary); background: #fffbeb;
      border-bottom: 1px solid #fde68a;
    }

    .calendar-shell {
      flex: 1; max-width: 1280px; width: 100%; margin: 16px auto;
      background: var(--bg-primary); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); overflow: hidden;
      display: flex; flex-direction: column; min-height: 0;
    }
    .calendar-grid-container {
      flex: 1; overflow-y: auto; overflow-x: hidden; position: relative;
    }
    .grid-header-sentinel { height: 1px; margin-bottom: -1px; }
    .grid-header {
      display: flex; position: sticky; top: 0; z-index: 20;
      background-color: var(--color-primary-500);
      color: var(--text-inverse);
      transition: box-shadow 0.18s ease-out;
    }
    .grid-header.is-stuck.elevation-enabled { box-shadow: var(--shadow-lg); }
    .grid-header .header-cell {
      flex: 1; padding: 12px 8px; text-align: center;
      font-size: 13px; font-weight: 600;
      border-right: 1px solid rgba(255,255,255,0.2);
      min-width: 0; line-height: 1.4;
    }
    .grid-header .header-cell .date-num {
      display: block; font-size: 16px; font-weight: 700; margin-top: 2px;
    }
    .grid-header .category-header {
      flex: 0 0 180px;
      background-color: var(--color-primary-600);
      font-weight: 700;
    }
    .grid-row { display: flex; border-bottom: 1px solid var(--border-default); }
    .grid-cell {
      flex: 1; padding: 6px 4px; min-height: 72px; font-size: 12px;
      border-right: 1px solid var(--border-default); min-width: 0;
    }
    .grid-cell.category-cell {
      flex: 0 0 180px; background: var(--bg-secondary);
      font-weight: 500; display: flex; align-items: center;
      padding: 8px 12px; color: var(--text-primary); font-size: 12px;
    }
    .event-chip {
      display: block; background: var(--color-primary-100);
      color: var(--color-primary-600);
      border-left: 3px solid var(--color-primary-500);
      padding: 3px 6px; border-radius: 3px; font-size: 11px;
      margin-bottom: 3px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; font-weight: 500;
    }
    .event-chip.alt  { background:#fef3c7; color:#92400e; border-left-color:#d97706; }
    .event-chip.alt2 { background:#dcfce7; color:#166534; border-left-color:#16a34a; }
    .event-chip.alt3 { background:#fce7f3; color:#9f1239; border-left-color:#e11d48; }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>Sticky Date Header — Mockup (Week View)</h1>
    <div class="controls">
      <span class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">At top</span></span>
      <label class="toggle-pill">
        <input type="checkbox" id="elevationToggle" checked>
        Elevation cue when scrolled
      </label>
    </div>
  </header>

  <div class="hint">
    Scroll the calendar below. The date header stays pinned at top. Toggle the elevation cue to compare WITH vs WITHOUT the drop shadow.
  </div>

  <div class="calendar-shell">
    <div class="calendar-grid-container" id="scrollContainer">
      <div class="grid-header-sentinel" id="sentinel"></div>
      <div class="grid-header elevation-enabled" id="gridHeader">
        <div class="header-cell category-header">Category</div>
        <div class="header-cell">Mon<span class="date-num">5</span></div>
        <div class="header-cell">Tue<span class="date-num">6</span></div>
        <div class="header-cell">Wed<span class="date-num">7</span></div>
        <div class="header-cell">Thu<span class="date-num">8</span></div>
        <div class="header-cell">Fri<span class="date-num">9</span></div>
        <div class="header-cell">Sat<span class="date-num">10</span></div>
        <div class="header-cell">Sun<span class="date-num">11</span></div>
      </div>
      <div id="gridBody"></div>
    </div>
  </div>

  <script>
    const categories = [
      'Adult Learning', "B'nai Mitzvah", 'Brotherhood', 'Cantor', 'Catered Events',
      'Clergy Meetings', 'Community Outreach', 'Education', 'Festival', 'Holiday Services',
      'Membership', 'Music', 'Religious School', 'Sisterhood', 'Social Action',
      'Special Events', 'Staff Meeting', 'Sunday School', 'Tikkun Olam', 'Tot Shabbat',
      'Wedding', 'Youth Group', 'Adult Choir', 'Board Meeting', 'Building Committee',
      'Caring Community', 'Chevrah Kadisha', "Children's Programming", 'Dinner Event', 'Family Service'
    ];
    const eventTypes = ['', 'alt', 'alt2', 'alt3'];
    const sampleTitles = [
      'Hebrew Class', 'Shabbat Service', 'Board Meeting', 'Rehearsal',
      'Workshop', 'Bar Mitzvah', 'Tot Shabbat', 'Pre-Oneg Dinner',
      'Adult Ed Lecture', 'Committee Meeting', 'Family Program'
    ];
    function rand(n) { return Math.floor(Math.random() * n); }
    function randomEventsForRow() {
      const slots = [[],[],[],[],[],[],[]];
      const count = rand(3);
      for (let i = 0; i < count; i++) {
        const day = rand(7);
        const title = sampleTitles[rand(sampleTitles.length)];
        const type = eventTypes[rand(eventTypes.length)];
        slots[day].push({ title, type });
      }
      return slots;
    }

    const gridBody = document.getElementById('gridBody');
    categories.forEach(function (cat) {
      const row = document.createElement('div');
      row.className = 'grid-row';

      const catCell = document.createElement('div');
      catCell.className = 'grid-cell category-cell';
      catCell.textContent = cat;
      row.appendChild(catCell);

      const slots = randomEventsForRow();
      for (let d = 0; d < 7; d++) {
        const dayCell = document.createElement('div');
        dayCell.className = 'grid-cell day-cell';
        slots[d].forEach(function (ev) {
          const chip = document.createElement('span');
          chip.className = 'event-chip' + (ev.type ? ' ' + ev.type : '');
          chip.textContent = ev.title;
          dayCell.appendChild(chip);
        });
        row.appendChild(dayCell);
      }
      gridBody.appendChild(row);
    });

    const sentinel = document.getElementById('sentinel');
    const header = document.getElementById('gridHeader');
    const statusPill = document.getElementById('statusPill');
    const statusText = document.getElementById('statusText');
    const observer = new IntersectionObserver(function (entries) {
      const stuck = entries[0].intersectionRatio < 1;
      header.classList.toggle('is-stuck', stuck);
      statusPill.classList.toggle('stuck', stuck);
      statusText.textContent = stuck ? 'Header pinned' : 'At top';
    }, { threshold: [1], rootMargin: '-1px 0px 0px 0px' });
    observer.observe(sentinel);

    const toggle = document.getElementById('elevationToggle');
    toggle.addEventListener('change', function () {
      header.classList.toggle('elevation-enabled', toggle.checked);
    });
  </script>
</body>
</html>
